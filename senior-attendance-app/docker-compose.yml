services:
  mariadb:
    image: mariadb:11.4
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${DB_NAME:-senior_attendance}
      MARIADB_USER: ${DB_USERNAME:-senior}
      MARIADB_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mariadb-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h localhost -uroot -p$$MARIADB_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
    mem_limit: 512m

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-senior_attendance}
      DB_USERNAME: ${DB_USERNAME:-senior}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      REFRESH_TOKEN_HASH_SECRET: ${REFRESH_TOKEN_HASH_SECRET}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost}
      COOLSMS_API_KEY: ${COOLSMS_API_KEY:-}
      COOLSMS_API_SECRET: ${COOLSMS_API_SECRET:-}
      COOLSMS_SENDER_NUMBER: ${COOLSMS_SENDER_NUMBER:-}
    depends_on:
      mariadb:
        condition: service_healthy
    mem_limit: 768m

  admin-web:
    build:
      context: ./admin-web
      args:
        VITE_API_BASE_URL: ""
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    mem_limit: 64m

volumes:
  mariadb-data:

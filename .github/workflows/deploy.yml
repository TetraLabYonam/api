name: Deploy (self-hosted, systemd)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: [self-hosted, linux, x64]
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Build (test + bootJar)
        run: |
          chmod +x ./gradlew
          ./gradlew clean test bootJar

      - name: Install JAR to /opt/myapp/app.jar
        run: |
          set -euo pipefail
          JAR="$(ls -1 build/libs/*.jar | head -n 1)"
          echo "Using JAR: $JAR"

          sudo mkdir -p /opt/myapp
          sudo cp "$JAR" /opt/myapp/app.jar
          sudo chown ubuntu:ubuntu /opt/myapp/app.jar
          sudo chmod 0644 /opt/myapp/app.jar

      - name: Restart systemd service
        run: |
          sudo systemctl daemon-reload
          sudo systemctl restart myapp
          sudo systemctl --no-pager --full status myapp || true

      - name: Show last logs on failure
        if: failure()
        run: |
          sudo journalctl -u myapp -n 200 --no-pager || true

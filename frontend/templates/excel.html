<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8" />
    <title>Google Map V2 - Excel Upload</title>
    <style>
        #map {
            width: 100%;
            height: 70vh;
            border-radius: 12px;
            margin-top: 20px;
        }
        body {
            margin: 0;
            font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
            background-color: #f5f5f5;
        }
        .wrap {
            max-width: 960px;
            margin: 24px auto;
            padding: 0 16px;
        }
        .title {
            margin: 12px 0 16px;
            font-weight: 700;
            font-size: 24px;
            color: #333;
        }
        .upload-section {
            background: white;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #555;
        }
        .file-input {
            padding: 10px;
            border: 2px dashed #ddd;
            border-radius: 8px;
            width: 100%;
            cursor: pointer;
        }
        .submit-btn {
            background: #4285f4;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
        }
        .submit-btn:hover {
            background: #3367d6;
        }
        .locations-info {
            background: white;
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .location-item {
            padding: 8px;
            border-bottom: 1px solid #eee;
        }
        .location-item:last-child {
            border-bottom: none;
        }
        .save-section {
            margin-top: 20px;
            text-align: center;
        }
        .save-btn {
            background: #34a853;
            color: white;
            padding: 12px 32px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: background 0.3s;
        }
        .save-btn:hover {
            background: #2d8e47;
        }
        .save-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .message {
            margin-top: 16px;
            padding: 12px;
            border-radius: 8px;
            display: none;
        }
        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>
<body>
<div class="wrap">
    <div class="title">Google Map V2 - Excel Upload</div>

    <div class="upload-section">
        <form method="post" enctype="multipart/form-data" th:action="@{/map-excel}">
            <div class="form-group">
                <label class="form-label" for="file">엑셀 파일을 선택하세요 (주소가 포함된 파일)</label>
                <input type="file"
                       id="file"
                       name="file"
                       accept=".xlsx,.xls"
                       class="file-input"
                       required />
            </div>
            <button type="submit" class="submit-btn">업로드 및 지도 표시</button>
        </form>
    </div>

    <div th:if="${locations != null and !locations.isEmpty()}" class="locations-info">
        <h3>업로드된 위치 정보 (<span th:text="${locations.size()}">0</span>개)</h3>
        <div th:each="loc, iterStat : ${locations}" class="location-item">
            <strong th:text="${iterStat.count}">1</strong>.
            <span th:text="${loc.businessUnit}">주소</span>:
            <span th:text="${loc.address}">주소</span> -
            (위도: <span th:text="${loc.lat}">0</span>,
            경도: <span th:text="${loc.lng}">0</span>)
        </div>
    </div>

    <div id="map" th:if="${locations != null and !locations.isEmpty()}"></div>

    <div th:if="${locations != null and !locations.isEmpty()}" class="save-section">
        <button id="saveBtn" class="save-btn" onclick="saveLocationsToDb()">데이터베이스에 저장</button>
        <div id="message" class="message"></div>
    </div>
</div>

<script th:inline="javascript">
    const LOCATIONS = /*[[${locations}]]*/ [];
    const API_KEY = /*[[${googleMapsApiKey}]]*/ '';

    // 데이터베이스에 저장하는 함수
    function saveLocationsToDb() {
        const saveBtn = document.getElementById('saveBtn');
        const messageDiv = document.getElementById('message');

        // 버튼 비활성화
        saveBtn.disabled = true;
        saveBtn.textContent = '저장 중...';

        // POST 요청
        fetch('/api/place/save-all', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(LOCATIONS)
        })
        .then(response => {
            if (!response.ok) {
                throw new Error('저장에 실패했습니다.');
            }
            return response.text();
        })
        .then(data => {
            // 성공 메시지 표시
            messageDiv.textContent = data;
            messageDiv.className = 'message success';
            messageDiv.style.display = 'block';

            // 버튼 텍스트 변경
            saveBtn.textContent = '저장 완료';
        })
        .catch(error => {
            // 에러 메시지 표시
            messageDiv.textContent = '저장 중 오류가 발생했습니다: ' + error.message;
            messageDiv.className = 'message error';
            messageDiv.style.display = 'block';

            // 버튼 재활성화
            saveBtn.disabled = false;
            saveBtn.textContent = '데이터베이스에 저장';
        });
    }

    if (LOCATIONS.length > 0) {
        window.initMap = function() {
            // 첫 번째 위치를 중심으로 설정
            const firstPos = { lat: LOCATIONS[0].lat, lng: LOCATIONS[0].lng };

            const map = new google.maps.Map(document.getElementById('map'), {
                center: firstPos,
                zoom: 12,
                mapTypeControl: false,
                streetViewControl: false
            });

            // 모든 위치에 마커 추가
            const bounds = new google.maps.LatLngBounds();

            LOCATIONS.forEach((location, index) => {
                const pos = { lat: location.lat, lng: location.lng };

                const marker = new google.maps.Marker({
                    position: pos,
                    map: map,
                    title: location.address,
                    label: (index + 1).toString()
                });

                const infoWindow = new google.maps.InfoWindow({
                    content: `<div style="min-width:200px">
                                <b>${index + 1}. ${location.address}</b><br/>
                                (${location.lat.toFixed(6)}, ${location.lng.toFixed(6)})
                              </div>`
                });

                marker.addListener('click', () => {
                    infoWindow.open({ anchor: marker, map: map });
                });

                bounds.extend(pos);
            });

            // 모든 마커가 보이도록 지도 범위 조정
            if (LOCATIONS.length > 1) {
                map.fitBounds(bounds);
            }
        };
    }
</script>

<script th:if="${locations != null and !locations.isEmpty()}"
        th:src="@{|https://maps.googleapis.com/maps/api/js?key=${googleMapsApiKey}&callback=initMap|}"
        async defer></script>
</body>
</html>

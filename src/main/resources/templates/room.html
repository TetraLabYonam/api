<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <title>번호표 시스템</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 900px;
            margin: 20px auto;
            padding: 20px;
        }
        h3 {
            color: #333;
        }
        #roomList {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }
        .room-card {
            border: 2px solid #ddd;
            border-radius: 8px;
            padding: 15px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .room-card:hover {
            border-color: #007bff;
            box-shadow: 0 2px 8px rgba(0,123,255,0.2);
        }
        .room-title {
            font-weight: bold;
            font-size: 16px;
            margin-bottom: 8px;
        }
        .room-uid {
            color: #666;
            font-size: 14px;
            margin-bottom: 4px;
        }
        .room-number {
            color: #007bff;
            font-size: 14px;
        }
        #ticketSection {
            display: none;
        }
        .btn {
            padding: 10px 20px;
            margin: 5px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }
        .btn-primary {
            background-color: #007bff;
            color: white;
        }
        .btn-primary:hover {
            background-color: #0056b3;
        }
        .btn-secondary {
            background-color: #6c757d;
            color: white;
        }
        .btn-secondary:hover {
            background-color: #545b62;
        }
        #log {
            background-color: #f8f9fa;
            padding: 10px;
            border-radius: 5px;
            max-height: 300px;
            overflow-y: auto;
        }
        .selected-room {
            background-color: #e7f3ff;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <div id="roomListSection">
        <h3>방 목록</h3>
        <button class="btn btn-secondary" onclick="refreshRoomList()">새로고침</button>
        <div id="roomList"></div>
    </div>

    <div id="ticketSection">
        <button class="btn btn-secondary" onclick="backToRoomList()">← 방 목록으로</button>
        <div class="selected-room">
            <h3>번호표 시스템</h3>
            <div>선택한 방: <span id="selectedRoomTitle"></span></div>
            <div>방 코드: <strong id="selectedRoomUid"></strong></div>
            <div style="color: #28a745; margin-top: 5px;">✓ 방에 자동으로 접속되었습니다</div>
        </div>
        <button id="issueBtn" class="btn btn-primary">번호표 받기</button>
        <button class="btn btn-secondary" onclick="showIssuances()">발급 목록 보기</button>
        <pre id="log"></pre>

        <div id="issuanceList" style="margin-top: 20px; display: none;">
            <h4>발급된 번호표 목록</h4>
            <table style="width: 100%; border-collapse: collapse; background: white;">
                <thead>
                    <tr style="background-color: #f8f9fa;">
                        <th style="border: 1px solid #ddd; padding: 8px;">번호</th>
                        <th style="border: 1px solid #ddd; padding: 8px;">사용자 ID</th>
                        <th style="border: 1px solid #ddd; padding: 8px;">발급 시간</th>
                    </tr>
                </thead>
                <tbody id="issuanceTableBody">
                </tbody>
            </table>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/socket.io-client@2.3.0/dist/socket.io.js"></script>
    <script th:inline="javascript">
        const SOCKET_URL = "http://localhost:9092";
        const USER_KEY = localStorage.getItem("userKey") || (function(){
            const key = "USER-" + Math.random().toString(36).substring(2,10);
            localStorage.setItem("userKey", key);
            return key;
        })();

        let socket = null;
        let currentRoomUid = null;

        // Thymeleaf에서 전달받은 roomId (URL 파라미터)
        const urlRoomId = /*[[${roomId}]]*/ null;

        // 페이지 로드 시
        window.onload = function() {
            if (urlRoomId) {
                // URL에 roomId가 있으면 바로 해당 방으로 입장
                selectRoom(urlRoomId, "방 #" + urlRoomId);
            } else {
                // roomId가 없으면 방 목록 표시
                loadRoomList();
            }
        };

        // 방 목록 불러오기
        async function loadRoomList() {
            try {
                const response = await fetch('/api/rooms');
                const rooms = await response.json();

                const roomListDiv = document.getElementById('roomList');
                roomListDiv.innerHTML = '';

                if (rooms.length === 0) {
                    roomListDiv.innerHTML = '<p>생성된 방이 없습니다.</p>';
                    return;
                }

                rooms.forEach(room => {
                    const card = document.createElement('div');
                    card.className = 'room-card';
                    card.onclick = () => selectRoom(room.roomUid, room.title);

                    card.innerHTML = `
                        <div class="room-title">${room.title || '제목 없음'}</div>
                        <div class="room-uid">방 코드: ${room.roomUid}</div>
                        <div class="room-number">현재 번호: ${room.currentNumber}</div>
                    `;

                    roomListDiv.appendChild(card);
                });
            } catch (error) {
                console.error('방 목록 로드 실패:', error);
                alert('방 목록을 불러오는데 실패했습니다.');
            }
        }

        // 방 선택
        function selectRoom(roomUid, title) {
            currentRoomUid = roomUid;
            document.getElementById('selectedRoomTitle').textContent = title || '제목 없음';
            document.getElementById('selectedRoomUid').textContent = roomUid;

            document.getElementById('roomListSection').style.display = 'none';
            document.getElementById('ticketSection').style.display = 'block';

            // 소켓 연결
            if (!socket) {
                socket = io(SOCKET_URL, {
                    path: "/socket.io",
                    transports: ["websocket"]
                });

                socket.on("connect", () => {
                    log("Connected: " + socket.id);
                    // 연결되면 자동으로 방에 join
                    autoJoinRoom();
                });
                socket.on("disconnect", () => log("Disconnected"));
                socket.on("state", (data) => log("STATE " + JSON.stringify(data)));
                socket.on("issued", (num) => log("ISSUED " + num));
            } else {
                // 이미 소켓이 연결되어 있으면 바로 join
                autoJoinRoom();
            }
        }

        // 자동으로 방에 join
        function autoJoinRoom() {
            if (!currentRoomUid || !socket) return;
            const payload = { roomUid: currentRoomUid, userKey: USER_KEY };
            log("Auto joining room: " + currentRoomUid);
            socket.emit("join", payload, (ack) => log("Join ACK: " + JSON.stringify(ack)));
        }

        // 방 목록으로 돌아가기
        function backToRoomList() {
            document.getElementById('roomListSection').style.display = 'block';
            document.getElementById('ticketSection').style.display = 'none';
            document.getElementById('log').textContent = '';
            currentRoomUid = null;
        }

        // 방 목록 새로고침
        function refreshRoomList() {
            loadRoomList();
        }

        // 발급 목록 보기
        async function showIssuances() {
            if (!currentRoomUid) return;

            try {
                const response = await fetch(`/api/rooms/${currentRoomUid}/issuances`);
                const issuances = await response.json();

                const tableBody = document.getElementById('issuanceTableBody');
                tableBody.innerHTML = '';

                if (issuances.length === 0) {
                    tableBody.innerHTML = '<tr><td colspan="3" style="text-align: center; padding: 20px;">발급된 번호표가 없습니다.</td></tr>';
                } else {
                    issuances.forEach(issuance => {
                        const row = document.createElement('tr');
                        row.innerHTML = `
                            <td style="border: 1px solid #ddd; padding: 8px; text-align: center;">${issuance.number}</td>
                            <td style="border: 1px solid #ddd; padding: 8px;">${issuance.userKey}</td>
                            <td style="border: 1px solid #ddd; padding: 8px; text-align: center;">${issuance.issuedAt}</td>
                        `;
                        tableBody.appendChild(row);
                    });
                }

                document.getElementById('issuanceList').style.display = 'block';
            } catch (error) {
                console.error('발급 목록 조회 실패:', error);
                alert('발급 목록을 불러오는데 실패했습니다.');
            }
        }

        // 로그 출력
        const log = (msg) => document.getElementById("log").textContent += msg + "\n";

        // 번호표 받기 버튼
        document.getElementById("issueBtn").onclick = () => {
            if (!currentRoomUid) return;
            const payload = { roomUid: currentRoomUid, userKey: USER_KEY };
            log("Emit issue: " + JSON.stringify(payload));
            socket.emit("issue", payload, (ack) => log("Issue ACK: " + JSON.stringify(ack)));
        };
    </script>
</body>
</html>

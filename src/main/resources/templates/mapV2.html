<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8" />
    <title>Google Map V2 - Excel Upload</title>
    <style>
        #map {
            width: 100%;
            height: 70vh;
            border-radius: 12px;
            margin-top: 20px;
        }
        body {
            margin: 0;
            font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
            background-color: #f5f5f5;
        }
        .wrap {
            max-width: 960px;
            margin: 24px auto;
            padding: 0 16px;
        }
        .title {
            margin: 12px 0 16px;
            font-weight: 700;
            font-size: 24px;
            color: #333;
        }
        .upload-section {
            background: white;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #555;
        }
        .file-input {
            padding: 10px;
            border: 2px dashed #ddd;
            border-radius: 8px;
            width: 100%;
            cursor: pointer;
        }
        .submit-btn {
            background: #4285f4;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
        }
        .submit-btn:hover {
            background: #3367d6;
        }
        .locations-info {
            background: white;
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .location-item {
            padding: 8px;
            border-bottom: 1px solid #eee;
        }
        .location-item:last-child {
            border-bottom: none;
        }
    </style>
</head>
<body>
<div class="wrap">
    <div class="title">Google Map V2 - Excel Upload</div>

    <div class="upload-section">
        <form method="post" enctype="multipart/form-data" th:action="@{/mapV2}">
            <div class="form-group">
                <label class="form-label" for="file">엑셀 파일을 선택하세요 (주소가 포함된 파일)</label>
                <input type="file"
                       id="file"
                       name="file"
                       accept=".xlsx,.xls"
                       class="file-input"
                       required />
            </div>
            <button type="submit" class="submit-btn">업로드 및 지도 표시</button>
        </form>
    </div>

    <div th:if="${locations != null and !locations.isEmpty()}" class="locations-info">
        <h3>업로드된 위치 정보 (<span th:text="${locations.size()}">0</span>개)</h3>
        <div th:each="loc, iterStat : ${locations}" class="location-item">
            <strong th:text="${iterStat.count}">1</strong>.
            <span th:text="${loc.address}">주소</span> -
            (위도: <span th:text="${loc.lat}">0</span>,
            경도: <span th:text="${loc.lng}">0</span>)
        </div>
    </div>

    <div id="map" th:if="${locations != null and !locations.isEmpty()}"></div>
</div>

<script th:inline="javascript">
    const LOCATIONS = /*[[${locations}]]*/ [];
    const API_KEY = /*[[${googleMapsApiKey}]]*/ '';

    if (LOCATIONS.length > 0) {
        window.initMap = function() {
            // 첫 번째 위치를 중심으로 설정
            const firstPos = { lat: LOCATIONS[0].lat, lng: LOCATIONS[0].lng };

            const map = new google.maps.Map(document.getElementById('map'), {
                center: firstPos,
                zoom: 12,
                mapTypeControl: false,
                streetViewControl: false
            });

            // 모든 위치에 마커 추가
            const bounds = new google.maps.LatLngBounds();

            LOCATIONS.forEach((location, index) => {
                const pos = { lat: location.lat, lng: location.lng };

                const marker = new google.maps.Marker({
                    position: pos,
                    map: map,
                    title: location.address,
                    label: (index + 1).toString()
                });

                const infoWindow = new google.maps.InfoWindow({
                    content: `<div style="min-width:200px">
                                <b>${index + 1}. ${location.address}</b><br/>
                                (${location.lat.toFixed(6)}, ${location.lng.toFixed(6)})
                              </div>`
                });

                marker.addListener('click', () => {
                    infoWindow.open({ anchor: marker, map: map });
                });

                bounds.extend(pos);
            });

            // 모든 마커가 보이도록 지도 범위 조정
            if (LOCATIONS.length > 1) {
                map.fitBounds(bounds);
            }
        };
    }
</script>

<script th:if="${locations != null and !locations.isEmpty()}"
        th:src="@{|https://maps.googleapis.com/maps/api/js?key=${googleMapsApiKey}&callback=initMap|}"
        async defer></script>
</body>
</html>

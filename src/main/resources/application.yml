server:
  port: 8080
spring:
#  data:
#    redis:
#      host: localhost
#      port: 6379
  datasource:
#    url: jdbc:h2:tcp://localhost/~/jpashop
    url : jdbc:mariadb://localhost:3306/queueapp?useUnicode=true&characterEncoding=utf8
    username: queue
    password: queuepw
    driver-class-name: org.mariadb.jdbc.Driver
  h2:
    console: # H2 DB를 웹에서 관리할 수 있는 기능
      enabled: true           # H2 Console 사용 여부
      path: /h2-console
    properties:
  jpa:
    hibernate:
      ddl-auto: update  # Flyway를 사용하므로 validate로 변경
      hibernate:
        # show_sql: true
        format_sql: true
    open-in-view: false
  flyway:
    enabled: false
    baseline-on-migrate: true
    locations: classpath:db/migration
    sql-migration-prefix: V
    sql-migration-separator: __
    sql-migration-suffixes: .sql
  logging.level:
    org.hibernate.SQL: debug
  web:
    cors:
          mappings:
            - path-pattern: /api/**
              allowed-origins: "*"
              allowed-methods: "GET,POST,PUT,DELETE,OPTIONS"
              allowed-headers: "*"
              allow-credentials: true

# org.hibernate.type: trace #스프링 부트 2.x, hibernate5
# org.hibernate.orm.jdbc.bind: trace #스프링 부트 3.x, hibernate6

# Google Geocoding API Key는 application-API-KEY.properties 파일에서 관리됩니다.
app:
  socket:
    cors-origins: "https://example.com,http://localhost:3000,http://localhost:5173"

# 출석 관련 설정
attendance:
  location:
    radius: 100  # 출석 가능 반경 (미터)
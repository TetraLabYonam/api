spring.profiles.active=local
spring.profiles.include=API-KEY

# JWT Test Configuration
jwt.secret=test-secret-key-for-unit-tests-must-be-at-least-256-bits-long-for-HS256
jwt.access-exp-ms=900000
jwt.refresh-exp-ms=1209600000

# Refresh token hash secret for tests
refresh-token.hash-secret=test-refresh-secret
member-otp.hash-secret=test-otp-secret

# CoolSMS Test Configuration (dummy values for testing)
coolsms.api.key=test-api-key
coolsms.api.secret=test-api-secret
coolsms.api.number=01012345678

# Use H2 in-memory for tests
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
